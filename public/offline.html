<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <title>Sin conexión · Alejandra Salón</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #fdf6f8;
        color: #3a2530;
        text-align: center;
      }
      .card {
        max-width: 380px;
      }
      .icono {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: #8b2f47;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 30px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.5;
        color: #7a5c66;
        margin: 0 0 24px;
      }
      button {
        border: none;
        background: #8b2f47;
        color: white;
        font-size: 14px;
        font-weight: 600;
        padding: 12px 24px;
        border-radius: 999px;
        cursor: pointer;
      }
      button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icono">✂️</div>
      <h1>Sin conexión a internet</h1>
      <p>
        Parece que no tienes conexión en este momento. Revisa tu red e inténtalo de nuevo;
        algunas páginas que ya visitaste podrían seguir disponibles.
      </p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
